<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio One Piece</title>
</head>

<body>

    Digite a Quantidade de batalhas: <input type="text" id="iBatalhas"><br>
    Digite a Quantidade de marinheiros em cada batalha: <input type="text" id="iMarinheiros"><br>
    Digite a Quantidade de carnes disponíveis: <input type="text" id="iCarnes">

    <button onclick="batalhar()">Batalhar!</button><br><br>

    <div id="dResultado"></div>
</body>

</html>

<script>
    function batalhar() {
        let energiaLuffy = 100;

        let batalhas = Number(iBatalhas.value);
        let marinheiros = Number(iMarinheiros.value);
        let carnes = Number(iCarnes.value);

        let marinheirosDerrotados = 0;
        let ganhou = true;

        for (let i = 0; i < batalhas; i++) {
            energiaLuffy -= 10;

            if (energiaLuffy <= 0) {
                if (carnes > 0) {
                    carnes--;
                    energiaLuffy += 100;
                } else {
                    ganhou = false;
                }
            }

            for (let j = 0; j < marinheiros; j++) {

                energiaLuffy -= 5;
                marinheirosDerrotados++;

                if (energiaLuffy <= 0) {
                    if (carnes > 0) {
                        carnes--;
                        energiaLuffy += 100;
                    } else {
                        ganhou = false;
                    }
                }
            }

            if (!ganhou) {
                ganhou = false
            }
        }

        let msg = ``;
        if (ganhou) {
            msg += `<strong>Resultado: Luffy saiu vitorioso!</strong> <br><br>`;
        } else {
            msg += `<strong>Resultado: Luffy saiu derrotado!</strong> <br><br>`;
        }

        msg += `Quantidade de carnes restantes: ${carnes}<br>
                Quantidade de marinheiros derrotados: ${marinheirosDerrotados}<br>
                Energia restante ao final das batalhas: ${energiaLuffy}`;

        document.getElementById('dResultado').innerHTML = msg;
    }
</script>
